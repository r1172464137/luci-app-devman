<%+header%>
<style>
.dm-wrap{padding:16px}
.dm-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}
.dm-card{background:#fff;border-radius:10px;padding:16px;box-shadow:0 1px 4px rgba(0,0,0,.08);border:1px solid #e8e8e8;position:relative;transition:box-shadow .2s}
.dm-card:hover{box-shadow:0 2px 12px rgba(0,0,0,.12)}
.dm-card-top{display:flex;align-items:center;gap:6px;margin-bottom:10px;flex-wrap:nowrap;overflow:hidden}
.dm-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.dm-dot-green{background:#22c55e;box-shadow:0 0 6px rgba(34,197,94,.4)}
.dm-dot-yellow{background:#f59e0b;box-shadow:0 0 6px rgba(245,158,11,.4)}
.dm-dot-gray{background:#9ca3af}
.dm-name{font-weight:600;font-size:15px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.dm-type-tag{font-size:10px;padding:2px 8px;border-radius:10px;background:#f0f0f0;color:#666;flex-shrink:0}
.dm-speeds{display:block;margin-bottom:6px;font-size:20px;font-weight:700;color:#1a1a1a}
.dm-speeds div{line-height:1.5}
.dm-up{color:#2563eb}
.dm-dn{color:#16a34a}
.dm-detail{margin-bottom:8px;font-size:11px;color:#999}
.dm-actions{display:flex;gap:6px}
.dm-act{width:32px;height:32px;border-radius:50%;border:none;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;background:#f5f5f5;transition:all .15s}
.dm-act:hover{transform:scale(1.1)}
.dm-act.block{color:#dc2626}
.dm-act.unblock{color:#16a34a}
.dm-act.limit{color:#f59e0b}
.dm-act.rename{color:#6366f1}
.dm-blocked-badge{position:absolute;top:8px;right:8px;font-size:10px;background:#fef2f2;color:#dc2626;padding:2px 6px;border-radius:4px;font-weight:600}
.dm-limited-badge{position:absolute;top:8px;right:8px;font-size:10px;background:#fffbeb;color:#d97706;padding:2px 6px;border-radius:4px;font-weight:600}
.dm-empty{text-align:center;padding:60px 20px;color:#aaa;font-size:15px}
.dm-modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:9999}
.dm-modal-box{background:#fff;border-radius:8px;padding:24px;min-width:320px;max-width:400px;box-shadow:0 4px 20px rgba(0,0,0,.2)}
.dm-modal h3{margin:0 0 12px;font-size:16px}
.dm-modal label{display:block;margin-bottom:6px;font-size:13px;color:#666}
.dm-modal input{width:100%;padding:8px 12px;border:1px solid #d0d0d0;border-radius:4px;font-size:14px;box-sizing:border-box;margin-bottom:12px}
.dm-modal input:focus{outline:none;border-color:#55f}
.dm-modal-btns{display:flex;gap:8px;justify-content:flex-end}
.dm-modal-btns button{padding:8px 16px;border-radius:4px;border:none;cursor:pointer;font-size:13px}
.dm-btn-cancel{background:#e0e0e0;color:#333}
.dm-btn-save{background:#55f;color:#fff}

/* dark mode */
html[data-darkmode=true] .dm-card{background:#1e1e1e;border-color:#333}
html[data-darkmode=true] .dm-card:hover{box-shadow:0 2px 12px rgba(0,0,0,.4)}
html[data-darkmode=true] .dm-speeds{color:#f0f0f0}
html[data-darkmode=true] .dm-type-tag{background:#333;color:#aaa}
html[data-darkmode=true] .dm-act{background:#2a2a2a}
html[data-darkmode=true] .dm-empty{color:#666}
html[data-darkmode=true] .dm-blocked-badge{background:#3b1a1a}
html[data-darkmode=true] .dm-limited-badge{background:#3b2e1a}
html[data-darkmode=true] .dm-modal-box{background:#222;color:#ddd}
html[data-darkmode=true] .dm-modal label{color:#aaa}
html[data-darkmode=true] .dm-modal input{background:#333;border-color:#555;color:#ddd}
html[data-darkmode=true] .dm-btn-cancel{background:#444;color:#ccc}
</style>
<div class="dm-wrap">
<h2>Device Manager</h2>
<div id="dm-content"><p class="dm-empty">Loading...</p></div>
</div>
<script>
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function fmtSpeed(bps){if(!bps||bps>1e12)return'0';if(bps>=1e9)return(bps/1e9).toFixed(2)+' Gbps';if(bps>=1e6)return(bps/1e6).toFixed(1)+' Mbps';if(bps>=1e3)return(bps/1e3).toFixed(0)+' Kbps';return bps+' bps'}
function vendorIcon(t){
 var m={'Xiaomi':'#ff6900','Samsung':'#3c6cfa','Apple':'#555','Huawei':'#cf0a2c',
  'OnePlus':'#eb0028','Google':'#4285f4','Windows':'#0078d4','Linux':'#f5a623',
  'Android':'#3ddc84','iOS':'#999','IoT':'#888','Mobile':'#888'};
 if(t==='Unknown'||!t)return'';
 var c=m[t]||'#aaa',n=t;
 if(n.length>8)n=n.substring(0,7)+'…';
 return '<span style="color:'+c+';font-weight:700;font-size:12px;flex-shrink:0">'+esc(n)+'</span>';
}
function dot(s){
 if(s==='green')return'<div class="dm-dot dm-dot-green" title="Online"></div>';
 if(s==='yellow')return'<div class="dm-dot dm-dot-yellow" title="Maybe offline"></div>';
 return'<div class="dm-dot dm-dot-gray" title="Offline"></div>';
}
function load(){
 fetch('/cgi-bin/luci/admin/network/devman/api_devices').then(r=>r.json()).then(function(d){
  var c=document.getElementById('dm-content');
  if(!d||!d.length){c.innerHTML='<p class="dm-empty">No devices detected yet</p>';return}
  var h='<div class="dm-grid">';
  d.forEach(function(dev){
   var name=dev.alias||dev.hostname||'未命名设备';
   var limited=(dev.rate_limit||dev.rate_limit_down);
   h+='<div class="dm-card">';
   if(dev.is_blocked)h+='<div class="dm-blocked-badge">BLOCKED</div>';
   else if(limited)h+='<div class="dm-limited-badge">LIMITED</div>';
   h+='<div class="dm-card-top">'+vendorIcon(dev.device_type)+dot(dev.online)+'<span class="dm-name" title="'+esc(name)+'">'+esc(name)+'</span>';
   h+='</div>';
   h+='<div class="dm-speeds"><div class="dm-up">↑ '+fmtSpeed(dev.speed_in||0)+'</div><div class="dm-dn">↓ '+fmtSpeed(dev.speed_out||0)+'</div></div>';
   h+='<div class="dm-detail">'+esc(dev.current_ip||'')+' · '+esc(dev.current_mac||'')+'</div>';
   h+='<div class="dm-actions">';
   h+=dev.is_blocked
     ?'<button class="dm-act unblock" title="Unblock" onclick="tb('+dev.id+',0)">🔓</button>'
     :'<button class="dm-act block" title="Block" onclick="tb('+dev.id+',1)">🚫</button>';
   h+='<button class="dm-act limit" title="Limit" onclick="sl('+dev.id+','+(dev.rate_limit||0)+','+(dev.rate_limit_down||0)+')">⏱</button>';
   h+='<button class="dm-act rename" title="Rename" onclick="rn('+dev.id+',\''+esc(name)+'\')">✏️</button>';
   h+='</div></div>';
  });
  h+='</div>';
  c.innerHTML=h;
 });
}
function tb(id,b){fetch('/cgi-bin/luci/admin/network/devman/api_block?device_id='+id+'&block='+b).then(load)}
function showLimitModal(id,rateUp,rateDn){
 var m=document.createElement('div');m.className='dm-modal';
 var upVal=rateUp||0,dnVal=rateDn||0;
 var upUnit=kbpsToUnit(upVal),dnUnit=kbpsToUnit(dnVal);
 var upShow=upUnit?upVal/upUnit[1]:0;
 var dnShow=dnUnit?dnVal/dnUnit[1]:0;
 m.innerHTML='<div class="dm-modal-box"><h3>Bandwidth Limit</h3><div style="display:flex;gap:8px;align-items:center;margin-bottom:8px"><label style="flex:1">Upload</label><input id="dm-up" type="number" min="0" step="0.1" value="'+upShow.toFixed(1)+'" style="flex:1"><select id="dm-up-unit" style="width:80px"><option value="1000000000">Gbps</option><option value="1000000" selected>Mbps</option><option value="1000">Kbps</option></select></div><div style="display:flex;gap:8px;align-items:center;margin-bottom:8px"><label style="flex:1">Download</label><input id="dm-dn" type="number" min="0" step="0.1" value="'+dnShow.toFixed(1)+'" style="flex:1"><select id="dm-dn-unit" style="width:80px"><option value="1000000000">Gbps</option><option value="1000000" selected>Mbps</option><option value="1000">Kbps</option></select></div><div class="dm-modal-btns"><button class="dm-btn-cancel" onclick="this.closest(\'.dm-modal\').remove()">Cancel</button><button class="dm-btn-save">Apply</button></div></div>';
 document.body.appendChild(m);
 m.querySelector('.dm-btn-save').onclick=function(){
  var up=Math.round(parseFloat(m.querySelector('#dm-up').value)*parseInt(m.querySelector('#dm-up-unit').value))||0;
  var dn=Math.round(parseFloat(m.querySelector('#dm-dn').value)*parseInt(m.querySelector('#dm-dn-unit').value))||0;
  m.remove();
  fetch('/cgi-bin/luci/admin/network/devman/api_limit?device_id='+id+'&rate_limit='+up+'&rate_limit_down='+dn).then(load);
 };
 m.querySelector('#dm-up').focus();
 m.querySelector('#dm-up').onkeydown=function(e){if(e.key==='Enter')m.querySelector('#dm-dn').focus()};
 m.querySelector('#dm-dn').onkeydown=function(e){if(e.key==='Enter')m.querySelector('.dm-btn-save').click()};
}
function kbpsToUnit(bps){if(!bps)return null;if(bps>=1e9)return ['Gbps',1e9];if(bps>=1e6)return ['Mbps',1e6];if(bps>=1e3)return ['Kbps',1e3];return ['bps',1]}
function rn(id,n){
 var m=document.createElement('div');m.className='dm-modal';
 m.innerHTML='<div class="dm-modal-box"><h3>Rename</h3><input id="dm-rn" value="'+esc(n||'')+'"><div class="dm-modal-btns"><button class="dm-btn-cancel" onclick="this.closest(\'.dm-modal\').remove()">Cancel</button><button class="dm-btn-save">OK</button></div></div>';
 document.body.appendChild(m);
 m.querySelector('.dm-btn-save').onclick=function(){
  var v=m.querySelector('#dm-rn').value;
  m.remove();
  if(v&&v!==n)fetch('/cgi-bin/luci/admin/network/devman/api_limit?device_id='+id+'&rate_limit=-1&alias='+encodeURIComponent(v)).then(load);
 };
 m.querySelector('#dm-rn').focus();
 m.querySelector('#dm-rn').onkeydown=function(e){if(e.key==='Enter')m.querySelector('.dm-btn-save').click()};
}
function sl(id,curUp,curDn){showLimitModal(id,curUp,curDn)}
load();setInterval(load,5000);
document.querySelector('h2').textContent='Device Manager v6.7';
</script>
<%+footer%>
