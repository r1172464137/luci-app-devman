<%+header%>
<link rel="stylesheet" href="<%=resource%>/luci-static/resources/view/devman/style.css">
<div id="dm-app" class="dm-wrap">
  <div style="display:flex;align-items:center;gap:10px;margin-bottom:28px">
    <h2 style="margin:0">{{ title }}</h2>
    <select v-model="refreshMs" @change="changeRefresh" style="padding:3px 6px;border-radius:4px;border:1px solid #d0d0d0;font-size:12px;width:60px">
      <option value="5000">5秒</option><option value="15000">15秒</option><option value="30000">30秒</option>
    </select>
    <span style="font-size:12px;color:#999">{{ devices.length }} 台设备</span>
  </div>

  <div v-if="!devices.length" class="dm-empty">{{ loading ? '加载中...' : '暂无设备' }}</div>

  <template v-for="(group, gi) in deviceGroups" :key="gi">
    <div class="dm-grid">
      <div v-for="dev in group.devices" :key="dev.id" class="dm-card">
        <div v-if="dev.is_blocked" class="dm-blocked-badge">已封禁</div>
        <div v-else-if="dev.rate_limit || dev.rate_limit_down" class="dm-limited-badge">已限速</div>
        <div class="dm-card-top" v-html="vendorIcon(dev.device_type)"></div>
        <div class="dm-card-top">
          <span :class="'dm-dot dm-dot-' + dev.online" :title="dev.online === 'green' ? '在线' : dev.online === 'yellow' ? '可能离线' : '离线'"></span>
          <span class="dm-name" :title="deviceName(dev)">{{ deviceName(dev) }}</span>
        </div>
        <div class="dm-speeds">
          <div class="dm-up">↑ {{ fmtSpeed(dev.speed_in) }}</div>
          <div class="dm-dn">↓ {{ fmtSpeed(dev.speed_out) }}</div>
        </div>
        <div class="dm-detail">{{ dev.current_ip }} · {{ dev.current_mac }}</div>
        <div class="dm-actions">
          <button v-if="dev.is_blocked" class="dm-act unblock" title="解封" @click="toggleBlock(dev)">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#16a34a" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/><circle cx="12" cy="16" r="1"/></svg>
          </button>
          <button v-else class="dm-act block" title="封禁" @click="toggleBlock(dev)">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#dc2626" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/><line x1="3" y1="3" x2="21" y2="21"/></svg>
          </button>
          <button class="dm-act limit" title="限速" @click="showLimit(dev)">⚡</button>
          <button class="dm-act rename" title="重命名" @click="showRename(dev)">✎</button>
        </div>
      </div>
    </div>

    <div v-if="gi === 0 && unknownDevices.length" class="dm-unknown-section">
      <div class="dm-unknown-toggle" @click="showUnknown = !showUnknown">
        🐧 未知设备 ({{ unknownDevices.length }}) <span>{{ showUnknown ? '▼' : '▶' }}</span>
      </div>
      <div v-show="showUnknown" class="dm-grid">
        <div v-for="dev in unknownDevices" :key="dev.id" class="dm-card">
          <div class="dm-card-top" v-html="vendorIcon(dev.device_type)"></div>
          <div class="dm-card-top">
            <span :class="'dm-dot dm-dot-' + dev.online" :title="dev.online === 'green' ? '在线' : '离线'"></span>
            <span class="dm-name" :title="deviceName(dev)">{{ deviceName(dev) }}</span>
          </div>
          <div class="dm-speeds">
            <div class="dm-up">↑ {{ fmtSpeed(dev.speed_in) }}</div>
            <div class="dm-dn">↓ {{ fmtSpeed(dev.speed_out) }}</div>
          </div>
          <div class="dm-detail">{{ dev.current_ip }} · {{ dev.current_mac }}</div>
          <div class="dm-actions">
            <button class="dm-act rename" title="重命名" @click="showRename(dev)">✎</button>
          </div>
        </div>
      </div>
    </div>
  </template>

  <div v-if="showLimitModal" class="dm-modal" @click.self="showLimitModal=false">
    <div class="dm-modal-box">
      <h3>限速</h3>
      <p style="font-size:12px;color:#999;margin:0 0 12px">0 = 不限速</p>
      <div style="display:flex;gap:8px;align-items:center;margin-bottom:8px">
        <label style="flex:1">上传</label>
        <input v-model.number="limitUp" type="number" min="0" step="0.1" style="flex:1">
        <select v-model="limitUpUnit" style="width:80px">
          <option value="1000000000">Gbps</option><option value="1000000">Mbps</option><option value="1000">Kbps</option>
        </select>
      </div>
      <div style="display:flex;gap:8px;align-items:center;margin-bottom:8px">
        <label style="flex:1">下载</label>
        <input v-model.number="limitDn" type="number" min="0" step="0.1" style="flex:1">
        <select v-model="limitDnUnit" style="width:80px">
          <option value="1000000000">Gbps</option><option value="1000000">Mbps</option><option value="1000">Kbps</option>
        </select>
      </div>
      <div class="dm-modal-btns">
        <button class="dm-btn-cancel" @click="showLimitModal=false">取消</button>
        <button class="dm-btn-save" @click="applyLimit">应用</button>
      </div>
    </div>
  </div>

  <div v-if="showRenameModal" class="dm-modal" @click.self="showRenameModal=false">
    <div class="dm-modal-box">
      <h3>重命名</h3>
      <input v-model="renameVal" @keydown.enter="applyRename" style="width:100%;padding:8px 12px;border:1px solid #d0d0d0;border-radius:4px;font-size:14px;box-sizing:border-box;margin-bottom:12px">
      <div class="dm-modal-btns">
        <button class="dm-btn-cancel" @click="showRenameModal=false">取消</button>
        <button class="dm-btn-save" @click="applyRename">确定</button>
      </div>
    </div>
  </div>
</div>
<script src="<%=resource%>/luci-static/resources/view/devman/vue.global.prod.js"></script>
<script src="<%=resource%>/luci-static/resources/view/devman/app.js"></script>
<%+footer%>
